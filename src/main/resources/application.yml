spring:

  datasource:
    url: jdbc:postgresql://localhost:5432/financedb?TimeZone=Asia/Kolkata
    username: postgres
    password: password
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      idle-timeout: 300000
      max-lifetime: 600000
      connection-timeout: 20000
      keepalive-time: 60000
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        jpa:
        time_zone: Asia/Kolkata
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
  data:
    redis:
      host: localhost
      port: 6379
  cache:
    type: redis
  spring:
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false
    consumer:
      group-id: finance-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
        spring.json.value.default.type: com.sailu.finance_api.event.TransactionEvent

jwt:
  secret: 3cfa76ef14937c1c0ea519f8fc057a80fcd04a7d0d9efad4b77bde10b9071a1a
  expiry: 86400000

server:
  port: 8080

logging:
  level:
    org.springframework.security: DEBUG